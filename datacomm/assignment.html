<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Assignment PDF</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    background:#060816;
    color:white;
    font-family:'Poppins',sans-serif;
}

.pdf-container{
    width:100%;
    min-height:100vh;
    padding:120px 5% 40px;
}

.pdf-header{
    text-align:center;
    margin-bottom:30px;
}

.pdf-header h1{
    font-size:45px;
    margin-bottom:10px;
    color:#00d9ff;
}

.pdf-header p{
    color:#cfd8dc;
}

.pdf-viewer{
    width:100%;
    height:85vh;
    border-radius:20px;
    overflow:hidden;
    border:2px solid rgba(255,255,255,0.1);
    box-shadow:0 0 30px rgba(0,217,255,0.15);
}

.pdf-viewer iframe{
    width:100%;
    height:100%;
    border:none;
}

.back-btn{
    display:inline-block;
    margin-top:30px;
    padding:14px 28px;
    background:#00d9ff;
    color:black;
    text-decoration:none;
    border-radius:12px;
    font-weight:600;
    transition:0.3s;
}

.back-btn:hover{
    transform:translateY(-5px);
}

</style>

</head>

<body>

<div class="pdf-container">

<div class="pdf-header">

<h1>Embedded Assignment PDF</h1>

<p>
This section displays the assignment document directly inside the website.
</p>

</div>

<div class="pdf-viewer">

<iframe src="assignment.pdf"></iframe>

</div>

<a href="index.html" class="back-btn">
← Back To Home
</a>

</div>

</body>
</html>
