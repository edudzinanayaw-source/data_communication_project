<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Data Communication Video</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    background:#060816;
    color:white;
    font-family:'Poppins',sans-serif;
}

.video-page{
    width:100%;
    min-height:100vh;
    padding:120px 5% 40px;
}

.video-header{
    text-align:center;
    margin-bottom:40px;
}

.video-header h1{
    font-size:50px;
    color:#00d9ff;
    margin-bottom:15px;
}

.video-header p{
    color:#cfd8dc;
}

.video-container{
    width:100%;
    height:80vh;

    border-radius:25px;
    overflow:hidden;

    border:2px solid rgba(0,217,255,0.15);

    box-shadow:0 0 40px rgba(0,217,255,0.15);
}

.video-container iframe{
    width:100%;
    height:100%;
    border:none;
}

.back-btn{
    display:inline-block;
    margin-top:35px;

    padding:14px 28px;

    background:#00d9ff;
    color:black;

    text-decoration:none;
    border-radius:12px;

    font-weight:600;
    transition:0.3s;
}

.back-btn:hover{
    transform:translateY(-5px);
}

</style>

</head>

<body>

<div class="video-page">

<div class="video-header">

<h1>Embedded YouTube Lesson</h1>

<p>
Watch a data communication lesson directly inside the website.
</p>

</div>

<div class="video-container">

<iframe
src="https://www.youtube.com/embed/3QhU9jd03a0"
title="YouTube video player"
allowfullscreen>
</iframe>

</div>

<a href="index.html" class="back-btn">
← Back To Home
</a>

</div>

</body>
</html>
